name: CI - Build and Test

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Test, and Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Validate Maven wrapper files
        run: |
          test -f ./mvnw || (echo "Missing mvnw" && exit 1)
          test -f ./.mvn/wrapper/maven-wrapper.properties || (echo "Missing .mvn/wrapper/maven-wrapper.properties" && exit 1)
          chmod +x ./mvnw

      - name: Compile project
        run: ./mvnw -B compile

      - name: Run tests and generate coverage
        run: ./mvnw -B verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Write workflow summary
        if: always()
        run: |
          {
            echo "## VaultPay CI Summary"
            echo ""
            echo "- Commit: ${{ github.sha }}"
            echo "- Branch: ${{ github.ref_name }}"
            echo "- Triggered by: ${{ github.actor }}"
            echo "- Build command: ./mvnw -B verify"
            echo "- Coverage report: target/site/jacoco/"
          } >> "$GITHUB_STEP_SUMMARY"
