name: CD - Build and Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-main
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run verification suite
        run: ./mvnw -B verify

  publish:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vaultpay
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/vaultpay:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/vaultpay:buildcache,mode=max

      - name: Write deployment summary
        run: |
          {
            echo "## VaultPay Deployment Summary"
            echo ""
            echo "- Image: ghcr.io/${{ github.repository_owner }}/vaultpay"
            echo "- Tags:"
            printf '%s\n' "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/- /'
            echo "- Commit: ${{ github.sha }}"
            echo "- Triggered by: ${{ github.actor }}"
          } >> "$GITHUB_STEP_SUMMARY"
